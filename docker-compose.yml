services:
  api:
    build: .
    container_name: fastapi_app

    volumes:
      - .:/code

    ports:
      - "8000:8000"

    depends_on:
      - mysql

    env_file:
      - .env

  mysql:
    image: mysql:8.0
    container_name: mysql_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shop_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    restart: always

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data:
